name: LinkedIn Auto Post

on:
  schedule:
    - cron: '0 0 * * *'  # 매일 UTC 00:00 = KST 09:00
  workflow_dispatch:       # 수동 실행 버튼

jobs:
  post:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 설치
        uses: uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 라이브러리 설치
        run: pip install feedparser anthropic langgraph apscheduler python-dotenv requests

      - name: .env 파일 생성
        run: |
          echo "ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}" >> .env
          echo "LINKEDIN_CLIENT_ID=${{ secrets.LINKEDIN_CLIENT_ID }}" >> .env
          echo "LINKEDIN_CLIENT_SECRET=${{ secrets.LINKEDIN_CLIENT_SECRET }}" >> .env
          echo "LINKEDIN_ACCESS_TOKEN=${{ secrets.LINKEDIN_ACCESS_TOKEN }}" >> .env
          echo "LINKEDIN_REFRESH_TOKEN=${{ secrets.LINKEDIN_REFRESH_TOKEN }}" >> .env

      - name: 파이프라인 실행
        run: python scheduler.py --now